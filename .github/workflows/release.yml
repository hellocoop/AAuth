name: Publish

on:
  release:
    types: [published]

permissions:
  contents: read
  id-token: write

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm test

  hardware-keys:
    uses: ./.github/workflows/hardware-keys.yml
    with:
      publish: true
    secrets:
      NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
    permissions:
      contents: read
      id-token: write

  publish:
    needs: [test, hardware-keys]
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          registry-url: https://registry.npmjs.org
      - run: npm ci
      - name: Build packages (dependency order)
        run: |
          for pkg in local-keys bootstrap mcp-server mcp-agent mcp-openclaw mcp-stdio; do
            echo "Building $pkg..."
            (cd $pkg && npm run build)
          done

      - name: Verify version from release tag
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          ROOT_VERSION=$(node -p "require('./package.json').version")
          if [ "$VERSION" != "$ROOT_VERSION" ]; then
            echo "❌ Release tag v$VERSION does not match package.json version $ROOT_VERSION"
            exit 1
          fi
          echo "VERSION=$VERSION" >> "$GITHUB_ENV"
          echo "Publishing version $VERSION"

      - name: Verify all packages have same version
        run: |
          for pkg in mcp-server mcp-agent mcp-openclaw mcp-stdio local-keys bootstrap hardware-keys; do
            PKG_VERSION=$(node -p "require('./$pkg/package.json').version")
            if [ "$PKG_VERSION" != "$VERSION" ]; then
              echo "❌ $pkg has version $PKG_VERSION, expected $VERSION"
              exit 1
            fi
          done
          for pkg in darwin-arm64 darwin-x64 linux-x64-gnu win32-x64-msvc; do
            PKG_VERSION=$(node -p "require('./hardware-keys/npm/$pkg/package.json').version")
            if [ "$PKG_VERSION" != "$VERSION" ]; then
              echo "❌ hardware-keys-$pkg has version $PKG_VERSION, expected $VERSION"
              exit 1
            fi
          done
          echo "✅ All packages at version $VERSION"

      - name: Publish packages with provenance
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          for pkg in local-keys bootstrap mcp-server mcp-agent mcp-openclaw mcp-stdio; do
            published=$(npm view "@aauth/$pkg" version 2>/dev/null || echo "0.0.0")
            if [ "$published" = "$VERSION" ]; then
              echo "Skipping @aauth/$pkg@$VERSION (already published)"
            else
              echo "Publishing @aauth/$pkg@$VERSION (npm has $published)..."
              (cd $pkg && npm publish --provenance --access public)
            fi
          done
